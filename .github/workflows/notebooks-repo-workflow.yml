name: Notify Notebook2REST on notebook change

on:
  push:
    branches: [main]
    paths: ["**/*.ipynb"]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Collect changed notebooks
        id: changed
        run: |
          ADDED=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- '*.ipynb' | jq -R . | jq -s .)
          MODIFIED=$(git diff --name-only --diff-filter=M HEAD~1 HEAD -- '*.ipynb' | jq -R . | jq -s .)
          DELETED=$(git diff --name-only --diff-filter=D HEAD~1 HEAD -- '*.ipynb' | jq -R . | jq -s .)
          echo "added=$ADDED" >> $GITHUB_OUTPUT
          echo "modified=$MODIFIED" >> $GITHUB_OUTPUT
          echo "deleted=$DELETED" >> $GITHUB_OUTPUT

      - name: Trigger Notebook2REST sync
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.NOTEBOOK2REST_PAT }}
          repository: luborozporka/Notebook2REST
          event-type: notebooks-changed
          client-payload: |
            {
              "repo_url": "https://github.com/${{ github.repository }}",
              "commit_sha": "${{ github.sha }}",
              "ref": "refs/heads/${{ github.ref_name }}",
              "added": ${{ steps.changed.outputs.added }},
              "modified": ${{ steps.changed.outputs.modified }},
              "deleted": ${{ steps.changed.outputs.deleted }}
            }
